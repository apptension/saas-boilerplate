# @tool(name: "get_organization_settings", description: "Get organization-level financial settings including base currency, fiscal year start, overhead cap, and scenario thresholds.")
query GetOrganizationSettings($tenantId: ID!) {
  organizationSettings(tenantId: $tenantId) {
    id
    baseCurrency
    fiscalYearStartMonth
    scenarioThresholds
    overheadCapAmount
    overheadCapPeriod
    typeMappings
    createdAt
    updatedAt
  }
}
