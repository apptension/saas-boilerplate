[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
norecursedirs = __pypackages__ .git .tox .venv venv node_modules

env_override_existing_values = 1
env_files =
    .test.env

# Database configuration for better test isolation
# Migrations must run to create required collations (e.g., case_insensitive)
# 
# Database isolation options:
# --reuse-db: Reuse test database between runs (faster sequential runs, recommended for development)
#             This avoids the create/destroy cycle that causes most database conflicts
# --create-db: Force database creation (use when --reuse-db causes issues or for CI)
# --nomigrations: Skip migrations (NOT recommended - breaks collation creation)
#
# For CI/parallel execution, use: pytest --create-db
# For local development, use: pytest --reuse-db (faster, fewer conflicts)
#
# Note: The conftest.py includes smart cleanup hooks that handle database conflicts
#       by closing connections and terminating idle sessions when needed.
addopts = 
    --tb=short
    -v
    # Enable database reuse for faster sequential runs (reduces database conflicts)
    --reuse-db

[flake8]
max-line-length = 120
ignore = E121,E123,E126,E226,E24,E704,W503,W504,E203,E231
exclude = */migrations/* ./manage.py